name: Publish
on:
  push:
    tags:
      - 'v*'  # Стартира при всеки push на tag като v1.0.0, v2.1.3, и т.н.


permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/gradle.yml

  publish:
    needs: build
    name: Release build and publish
    runs-on: macOS-latest
    environment: release
    env:
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      ORG_GRADLE_PROJECT_signing.keyId: ${{ secrets.SIGNING_KEY_ID }}
      ORG_GRADLE_PROJECT_signing.password: ${{ secrets.SIGNING_PASSWORD }}
      ORG_GRADLE_PROJECT_signing.secretKey: ${{ secrets.GPG_KEY_CONTENTS }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Publish to MavenCentral
        run: |
          ./gradlew publishToMavenCentral \
            -Pversion=${{ steps.get_version.outputs.VERSION }} \
            --no-configuration-cache

      - name: Update version in README.md
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          echo "Updating README.md to version $VERSION"
          # Търсим и заменяме точно реда с депендънсито, позволявайки всякакви интервали
          sed -i "s|implementation(\"io.github.karloti:typeahead-kmp:[^\"]*\")|implementation(\"io.github.karloti:typeahead-kmp:$VERSION\")|g" README.md
          
          # Проверка за специфични интервали, които понякога се появяват при копиране
          if ! grep -q "typeahead-kmp:$VERSION" README.md; then
             echo "Trying loose match..."
             sed -i "s|io.github.karloti:typeahead-kmp:[0-9.]*|io.github.karloti:typeahead-kmp:$VERSION|g" README.md
          fi

          if grep -q "typeahead-kmp:$VERSION" README.md; then
            echo "Successfully updated README.md to $VERSION"
          else
            echo "CRITICAL: Could not find or update version in README.md"
            exit 1
          fi

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git commit -m "docs: update version in README to ${{ steps.get_version.outputs.VERSION }} [skip ci]" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main