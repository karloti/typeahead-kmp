name: Deploy to Cloud Run

on:
  push:
    branches:
      - master
      - main

env:
  PROJECT_ID: typeahead-kmp
  REGION: europe-west1
  REPO_NAME: typeahead-repo
  SERVICE_NAME: typeahead-service
  IMAGE_NAME: typeahead-demo-js
  # Updated with your actual Project Number: 942294408844
  WORKLOAD_IDENTITY_PROVIDER: 'projects/942294408844/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
  # Updated with the expected Service Account name for this project
  SERVICE_ACCOUNT: 'github-actions-deploy@typeahead-kmp.iam.gserviceaccount.com'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 25
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: 'write'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract Version
        id: get_version
        run: |
          # Fallback to 1.0.0 if version is not found in libs.versions.toml
          VERSION=$(grep "kotlin =" gradle/libs.versions.toml | cut -d '"' -f 2 || echo "1.0.0")
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Version determined as: $VERSION"

      - name: Create GitHub Tag and Release
        uses: actions/github-script@v7
        with:
          script: |
            const tagName = `v${process.env.APP_VERSION}-${context.sha.substring(0, 7)}`;
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/tags/${tagName}`,
                sha: context.sha
              });
              console.log(`Created tag: ${tagName}`);
            } catch (error) {
              console.log(`Tag ${tagName} might already exist or error occurred: ${error.message}`);
            }

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Container
        run: |
          IMAGE_PATH="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}"
          docker build -t $IMAGE_PATH:${{ github.sha }} \
                       -t $IMAGE_PATH:latest .
          docker push --all-tags $IMAGE_PATH

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          flags: '--allow-unauthenticated'
